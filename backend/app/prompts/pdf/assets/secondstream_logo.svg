<svg viewBox="0 0 280 60" xmlns="http://www.w3.org/2000/svg">
  <!--
    SecondStream Logo - Optimized SVG
    Features:
    - Semantic structure with title for accessibility
    - CSS custom property support for theming
    - Gradient lines with smooth round caps
    - Georgia serif typography
  -->

  <title>SecondStream</title>

  <defs>
    <linearGradient id="ss-logo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="hsl(215, 70%, 45%)"/>
      <stop offset="50%" stop-color="hsl(195, 80%, 65%)"/>
      <stop offset="100%" stop-color="hsl(215, 70%, 45%)"/>
    </linearGradient>
  </defs>

  <!-- Left accent lines (double stroke) -->
  <line x1="5" y1="28" x2="40" y2="28" stroke="url(#ss-logo-gradient)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="5" y1="36" x2="32" y2="36" stroke="url(#ss-logo-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Wordmark: SecondStream -->
  <text x="140" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="400" letter-spacing="0.01em" fill="hsl(215, 60%, 28%)" text-anchor="middle">
    SecondStream
  </text>

  <!-- Right accent lines -->
  <line x1="240" y1="28" x2="275" y2="28" stroke="url(#ss-logo-gradient)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="248" y1="36" x2="275" y2="36" stroke="url(#ss-logo-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Monogram: SR -->
  <text x="260" y="50" font-family="Georgia, serif" font-size="10" font-weight="600" fill="hsl(215, 70%, 45%)">ℛ</text>
</svg>
